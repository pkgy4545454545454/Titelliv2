<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titelli - Animation Logo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow: hidden;
        }

        .animation-container {
            position: relative;
            width: 800px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Texte Titelli avec effet typing */
        .titelli-text {
            position: relative;
            display: flex;
            align-items: flex-end;
        }

        .letter {
            font-size: 120px;
            font-weight: 400;
            color: white;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.5),
                0 0 20px rgba(255, 255, 255, 0.3),
                0 0 30px rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(50px);
            animation: none;
            letter-spacing: 2px;
        }

        .letter.visible {
            animation: typeIn 0.4s ease-out forwards;
        }

        @keyframes typeIn {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(1.2);
            }
            60% {
                opacity: 1;
                transform: translateY(-10px) scale(1);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Le i final qui sera remplacé par l'œil */
        .letter-i-final {
            position: relative;
            width: 60px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .letter-i-body {
            font-size: 120px;
            color: white;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.5),
                0 0 20px rgba(255, 255, 255, 0.3);
            opacity: 0;
        }

        .letter-i-body.visible {
            animation: typeIn 0.4s ease-out forwards;
        }

        /* Logo œil qui remplace le point du i */
        .eye-logo {
            position: absolute;
            width: 80px;
            height: 80px;
            top: -100px;
            opacity: 0;
            transform: scale(0);
        }

        .eye-logo.bounce-in {
            animation: bounceToI 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes bounceToI {
            0% {
                opacity: 0;
                transform: translateY(-200px) scale(0) rotate(-180deg);
            }
            50% {
                opacity: 1;
                transform: translateY(20px) scale(1.3) rotate(0deg);
            }
            70% {
                transform: translateY(-10px) scale(0.9) rotate(10deg);
            }
            85% {
                transform: translateY(5px) scale(1.1) rotate(-5deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1) rotate(0deg);
            }
        }

        /* L'œil avec les aiguilles animées */
        .eye-container {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .eye-iris {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, 
                #000 0%, #000 15%,
                #8B4513 16%, #CD853F 30%,
                #4169E1 31%, #1E90FF 60%,
                #00BFFF 80%, #87CEEB 100%
            );
            box-shadow: 
                0 0 20px rgba(30, 144, 255, 0.5),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .clock-hand {
            position: absolute;
            background: #000;
            transform-origin: bottom center;
            left: 50%;
            bottom: 50%;
            border-radius: 2px;
        }

        .hour-hand {
            width: 4px;
            height: 25px;
            margin-left: -2px;
            transform: rotate(-60deg);
        }

        .minute-hand {
            width: 3px;
            height: 32px;
            margin-left: -1.5px;
            transform: rotate(-30deg);
        }

        .hour-hand.closing {
            animation: closeHourHand 1s ease-in-out forwards;
        }

        .minute-hand.closing {
            animation: closeMinuteHand 1s ease-in-out forwards;
        }

        @keyframes closeHourHand {
            0% { transform: rotate(-60deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes closeMinuteHand {
            0% { transform: rotate(-30deg); }
            100% { transform: rotate(0deg); }
        }

        /* Effet de fermeture de l'œil */
        .eyelid {
            position: absolute;
            width: 100%;
            height: 50%;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            left: 0;
            transform-origin: center;
            opacity: 0;
        }

        .eyelid-top {
            top: 0;
            border-radius: 50% 50% 0 0;
            transform: scaleY(0);
        }

        .eyelid-bottom {
            bottom: 0;
            border-radius: 0 0 50% 50%;
            transform: scaleY(0);
        }

        .eyelid.closing {
            opacity: 1;
            animation: closeEyelid 0.5s ease-in-out 0.8s forwards;
        }

        @keyframes closeEyelid {
            0% { transform: scaleY(0); }
            100% { transform: scaleY(1); }
        }

        /* Cursor typing effect */
        .cursor {
            width: 4px;
            height: 100px;
            background: white;
            margin-left: 5px;
            animation: blink 0.7s infinite;
        }

        .cursor.hidden {
            display: none;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Particules décoratives */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            opacity: 0;
        }

        .particle.active {
            animation: sparkle 1s ease-out forwards;
        }

        @keyframes sparkle {
            0% {
                opacity: 1;
                transform: scale(0) translate(0, 0);
            }
            100% {
                opacity: 0;
                transform: scale(1) translate(var(--tx), var(--ty));
            }
        }

        /* Glow effect final */
        .final-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(30, 144, 255, 0.3) 0%, transparent 70%);
            opacity: 0;
            transform: scale(0.5);
        }

        .final-glow.active {
            animation: glowPulse 1.5s ease-in-out forwards;
        }

        @keyframes glowPulse {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.5); }
            100% { opacity: 0.5; transform: scale(1); }
        }

        /* Slogan */
        .slogan {
            position: absolute;
            bottom: 50px;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(30px);
        }

        .slogan.visible {
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Replay button */
        .replay-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .replay-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="animation-container">
        <div class="particles" id="particles"></div>
        
        <div class="titelli-text" id="text-container">
            <span class="letter" data-letter="T">T</span>
            <span class="letter" data-letter="i">i</span>
            <span class="letter" data-letter="t">t</span>
            <span class="letter" data-letter="e">e</span>
            <span class="letter" data-letter="l">l</span>
            <span class="letter" data-letter="l">l</span>
            <span class="letter-i-final" id="final-i">
                <div class="eye-logo" id="eye-logo">
                    <div class="eye-container">
                        <div class="final-glow" id="final-glow"></div>
                        <div class="eye-iris"></div>
                        <div class="clock-hand hour-hand" id="hour-hand"></div>
                        <div class="clock-hand minute-hand" id="minute-hand"></div>
                        <div class="eyelid eyelid-top" id="eyelid-top"></div>
                        <div class="eyelid eyelid-bottom" id="eyelid-bottom"></div>
                    </div>
                </div>
                <span class="letter-i-body" id="i-body">ı</span>
            </span>
            <span class="cursor" id="cursor"></span>
        </div>

        <div class="slogan" id="slogan">La vie plus simple</div>
    </div>

    <button class="replay-btn" onclick="replayAnimation()">↻ Rejouer</button>

    <script>
        const letters = document.querySelectorAll('.letter');
        const iBody = document.getElementById('i-body');
        const eyeLogo = document.getElementById('eye-logo');
        const hourHand = document.getElementById('hour-hand');
        const minuteHand = document.getElementById('minute-hand');
        const eyelidTop = document.getElementById('eyelid-top');
        const eyelidBottom = document.getElementById('eyelid-bottom');
        const cursor = document.getElementById('cursor');
        const slogan = document.getElementById('slogan');
        const finalGlow = document.getElementById('final-glow');
        const particlesContainer = document.getElementById('particles');

        let animationTimeout;

        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px');
                particle.style.setProperty('--ty', (Math.random() - 0.5) * 100 + 'px');
                particlesContainer.appendChild(particle);
                
                setTimeout(() => particle.classList.add('active'), 10);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function startAnimation() {
            // Reset everything
            letters.forEach(l => l.classList.remove('visible'));
            iBody.classList.remove('visible');
            eyeLogo.classList.remove('bounce-in');
            hourHand.classList.remove('closing');
            minuteHand.classList.remove('closing');
            eyelidTop.classList.remove('closing');
            eyelidBottom.classList.remove('closing');
            cursor.classList.remove('hidden');
            slogan.classList.remove('visible');
            finalGlow.classList.remove('active');

            // Typing animation for each letter
            const baseDelay = 200;
            
            letters.forEach((letter, index) => {
                setTimeout(() => {
                    letter.classList.add('visible');
                    // Add sound effect feeling with particles
                    const rect = letter.getBoundingClientRect();
                    createParticles(rect.left + rect.width/2 - particlesContainer.getBoundingClientRect().left, 
                                   rect.top + rect.height/2 - particlesContainer.getBoundingClientRect().top);
                }, baseDelay * (index + 1));
            });

            // Show the i body (without dot)
            setTimeout(() => {
                iBody.classList.add('visible');
            }, baseDelay * 7);

            // Hide cursor
            setTimeout(() => {
                cursor.classList.add('hidden');
            }, baseDelay * 7.5);

            // Bounce in the eye logo
            setTimeout(() => {
                eyeLogo.classList.add('bounce-in');
                const rect = eyeLogo.getBoundingClientRect();
                createParticles(rect.left + rect.width/2 - particlesContainer.getBoundingClientRect().left, 
                               rect.top + rect.height/2 - particlesContainer.getBoundingClientRect().top);
            }, baseDelay * 8.5);

            // Close the clock hands (eye closing effect)
            setTimeout(() => {
                hourHand.classList.add('closing');
                minuteHand.classList.add('closing');
                finalGlow.classList.add('active');
            }, baseDelay * 12);

            // Close eyelids
            setTimeout(() => {
                eyelidTop.classList.add('closing');
                eyelidBottom.classList.add('closing');
            }, baseDelay * 14);

            // Show slogan
            setTimeout(() => {
                slogan.classList.add('visible');
            }, baseDelay * 17);
        }

        function replayAnimation() {
            startAnimation();
        }

        // Start animation on load
        window.onload = () => {
            setTimeout(startAnimation, 500);
        };
    </script>
</body>
</html>
