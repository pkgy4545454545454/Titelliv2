<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Titelli</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-left">
            <a href="index.html" class="logo" style="margin-bottom: 48px;">
                <div class="logo-circle">T</div>
                <span class="logo-text">Titelli</span>
            </a>
            <h1>Les meilleurs prestataires<br>de la région</h1>
            <p>Rejoignez notre communauté et découvrez les services de qualité à Lausanne.</p>
        </div>
        <div class="auth-right">
            <div class="auth-form">
                <h2 id="form-title">Connexion</h2>
                <p class="subtitle" id="form-subtitle">Bon retour parmi nous !</p>

                <div class="user-type-toggle" id="user-type-toggle" style="display: none;">
                    <button type="button" class="user-type-btn active" data-type="client" onclick="selectUserType('client')">
                        👤 Client
                    </button>
                    <button type="button" class="user-type-btn entreprise" data-type="entreprise" onclick="selectUserType('entreprise')">
                        🏢 Entreprise
                    </button>
                </div>

                <form id="auth-form">
                    <div id="register-fields" style="display: none;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="form-group">
                                <label class="form-label">Prénom</label>
                                <input type="text" class="input" name="first_name" placeholder="Jean">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Nom</label>
                                <input type="text" class="input" name="last_name" placeholder="Dupont">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Téléphone</label>
                            <input type="tel" class="input" name="phone" placeholder="+41 XX XXX XX XX">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="input" name="email" placeholder="exemple@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" class="input" name="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; margin-top: 8px;">
                        <span id="submit-text">Se connecter</span>
                    </button>
                </form>

                <p class="auth-toggle">
                    <span id="toggle-text">Pas encore de compte ?</span>
                    <a href="#" id="toggle-link" onclick="toggleMode(event)">S'inscrire</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        let isLoginMode = true;
        let selectedUserType = 'client';

        // Check URL params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('type') === 'entreprise') {
            selectedUserType = 'entreprise';
        }
        if (urlParams.get('mode') === 'register') {
            isLoginMode = false;
            updateMode();
        }

        function selectUserType(type) {
            selectedUserType = type;
            document.querySelectorAll('.user-type-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.type === type) btn.classList.add('active');
            });
        }

        function toggleMode(e) {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            updateMode();
        }

        function updateMode() {
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const registerFields = document.getElementById('register-fields');
            const userTypeToggle = document.getElementById('user-type-toggle');
            const submitText = document.getElementById('submit-text');
            const toggleText = document.getElementById('toggle-text');
            const toggleLink = document.getElementById('toggle-link');

            if (isLoginMode) {
                title.textContent = 'Connexion';
                subtitle.textContent = 'Bon retour parmi nous !';
                registerFields.style.display = 'none';
                userTypeToggle.style.display = 'none';
                submitText.textContent = 'Se connecter';
                toggleText.textContent = 'Pas encore de compte ?';
                toggleLink.textContent = "S'inscrire";
            } else {
                title.textContent = 'Inscription';
                subtitle.textContent = 'Créez votre compte Titelli';
                registerFields.style.display = 'block';
                userTypeToggle.style.display = 'flex';
                submitText.textContent = "S'inscrire";
                toggleText.textContent = 'Déjà un compte ?';
                toggleLink.textContent = 'Se connecter';
            }
        }

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;

            try {
                if (isLoginMode) {
                    const result = await API.login(form.email.value, form.password.value);
                    if (result.token) {
                        setAuth(result.token, result.user);
                        showToast('Connexion réussie !');
                        setTimeout(() => {
                            window.location.href = result.user.user_type === 'entreprise' 
                                ? 'dashboard-entreprise.html' 
                                : 'dashboard-client.html';
                        }, 500);
                    } else {
                        showToast(result.detail || 'Erreur de connexion', 'error');
                    }
                } else {
                    const data = {
                        email: form.email.value,
                        password: form.password.value,
                        first_name: form.first_name.value,
                        last_name: form.last_name.value,
                        phone: form.phone.value,
                        user_type: selectedUserType
                    };
                    const result = await API.register(data);
                    if (result.token) {
                        setAuth(result.token, result.user);
                        showToast('Inscription réussie !');
                        setTimeout(() => {
                            window.location.href = result.user.user_type === 'entreprise' 
                                ? 'dashboard-entreprise.html' 
                                : 'dashboard-client.html';
                        }, 500);
                    } else {
                        showToast(result.detail || "Erreur d'inscription", 'error');
                    }
                }
            } catch (error) {
                showToast('Erreur de connexion au serveur', 'error');
            }

            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
